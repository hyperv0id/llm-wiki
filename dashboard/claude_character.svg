<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="100%" height="100%">
  <style>
    .body { fill: #000000; }
    .eye { fill: #ffffff; }
    .shadow { fill: #000000; opacity: 0.3; }
  </style>

  <ellipse cx="120" cy="210" rx="50" ry="12" class="shadow">
    <animate attributeName="rx" values="50; 25; 50" keyTimes="0; 0.5; 1" calcMode="spline" keySplines="0 0 0.5 1; 0.5 0 1 1" dur="0.8s" repeatCount="indefinite" />
    <animate attributeName="ry" values="12; 6; 12" keyTimes="0; 0.5; 1" calcMode="spline" keySplines="0 0 0.5 1; 0.5 0 1 1" dur="0.8s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.3; 0.1; 0.3" keyTimes="0; 0.5; 1" calcMode="spline" keySplines="0 0 0.5 1; 0.5 0 1 1" dur="0.8s" repeatCount="indefinite" />
  </ellipse>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-50; 0,0" keyTimes="0; 0.5; 1" calcMode="spline" keySplines="0 0 0.5 1; 0.5 0 1 1" dur="0.8s" repeatCount="indefinite" />

    <rect x="70" y="40" width="20" height="40" class="body" />
    <rect x="150" y="40" width="20" height="40" class="body" />
    
    <rect x="60" y="80" width="120" height="10" class="body" />
    
    <rect x="50" y="90" width="140" height="60" class="body" />
    
    <rect x="30" y="110" width="20" height="20" class="body" />
    <rect x="190" y="110" width="20" height="20" class="body" />
    
    <rect x="70" y="150" width="30" height="40" class="body" />
    <rect x="140" y="150" width="30" height="40" class="body" />

    <rect x="80" y="110" width="20" height="20" class="eye" />
    <rect x="140" y="110" width="20" height="20" class="eye" />
  </g>
</svg>
